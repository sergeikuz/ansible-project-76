- name: Setup servers
  hosts: all
  become: true

  vars:
    pip_install_packages:
      - name: docker
    docker_dependencies:
      - apt-transport-https
      - ca-certificates
      - gnupg

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

  roles:
    - geerlingguy.pip
    - geerlingguy.docker

- name: Setup DataDog monitoring
  hosts: webservers
  become: true

  vars:
    datadog_site: "us5.datadoghq.com"
    datadog_checks:
      http_check:
        instances:
          - name: Redmine App
            url: "http://localhost:{{ redmine_port }}"
            timeout: 5

  roles:
    - datadog.datadog
